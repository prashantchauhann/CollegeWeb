<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priyadarshni College of Engineering - Attendance Portal</title>
    <link rel="stylesheet" href="media.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <img src="https://ik.imagekit.io/syustaging/SYU_PREPROD/Priyadarshini-College-of-Engineering---_PCE_-_Nagpur-_Maharashtra_h82_JfujWf.webp?tr=w-3840" alt="PCE">
                <h1>Priyadarshni College of Engineering</h1>
                <p>Attendance & Record Portal</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="rollNo">Roll Number</label>
                    <input type="text" id="rollNo" placeholder="Enter your Roll Number (e.g., PCE23CS001)" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            
            <div class="demo-links">
                <p>Demo Credentials:</p>
                <div class="demo-user">
                    <strong>PCE23CS001</strong> / demo123
                </div>
                <div class="demo-user">
                    <strong>PCE23ME002</strong> / demo123
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
